<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タブデザイン比較 WF</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FB4C15; font-family: 'Hiragino Sans', sans-serif; padding: 40px; }

h2 { color: #fff; font-size: 20px; margin-bottom: 24px; font-weight: 500; }
.section { margin-bottom: 64px; }
.label { color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 16px; }

/* タブコンテナ */
.tabs { display: flex; gap: 12px; flex-wrap: wrap; }

/* ===== 現在のタブ（before） ===== */
.tab-before {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 4px 24px 4px 4px;
  border-radius: 42px;
  border: none;
  background: #1B1D1A;
  color: rgba(255,255,255,0.9);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  backdrop-filter: blur(16px);
}
.tab-before .avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.tab-before .avatar--active { background: #FB4C15; }
.tab-before--active {
  background: rgba(255,255,255,0.9);
  color: #1B1D1A;
}
.tab-before .label-wrap { display: flex; flex-direction: column; gap: 4px; text-align: left; }
.tab-before .main { font-size: 16px; font-weight: 600; line-height: 1.3; }
.tab-before .sub { font-size: 11px; font-weight: 400; opacity: 0.7; line-height: 1.3; }

/* ===== 新デザイン（after: fam-voices参考） ===== */
.tab-after {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 4px 24px 4px 4px;
  border-radius: 42px;
  border: none;
  background: #1B1D1A;
  color: rgba(255,255,255,0.9);
  cursor: pointer;
  white-space: nowrap;
  backdrop-filter: blur(16px);
  height: 72px;
}
.tab-after .avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.tab-after .avatar--active { background: #FB4C15; }
.tab-after--active {
  background: rgba(255,255,255,0.9);
  color: #1B1D1A;
}
.tab-after .label-wrap { display: flex; flex-direction: column; gap: 4px; text-align: left; }
.tab-after .main { font-size: 16px; font-weight: 600; line-height: 1.3; }
.tab-after .sub { font-size: 12px; font-weight: 400; opacity: 0.7; line-height: 1.3; }

/* ===== fam-voices参考（比較用） ===== */
.voice-card {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(16px);
  border-radius: 42px;
  padding: 4px 24px 4px 4px;
  height: 84px;
  white-space: nowrap;
}
.voice-card .avatar {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: #FB4C15;
  flex-shrink: 0;
}
.voice-card .text { font-size: 18px; font-weight: 500; color: #FB4C15; }
.voice-card .attr { font-size: 12px; font-weight: 400; color: #FB4C15; margin-top: 4px; }

/* SP */
@media (max-width: 767px) {
  body { padding: 24px 16px; }
  .tabs { flex-wrap: nowrap; overflow-x: auto; gap: 8px; padding-bottom: 8px; }
  .tab-after {
    height: 56px;
    padding: 4px 16px 4px 4px;
  }
  .tab-after .avatar {
    width: 48px;
    height: 48px;
  }
  .tab-after .main { font-size: 13px; }
  .tab-after .sub { font-size: 10px; }
}
</style>
</head>
<body>

<!-- BEFORE: 現在のデザイン -->
<div class="section">
  <p class="label">BEFORE（現在のタブデザイン）</p>
  <div class="tabs">
    <button class="tab-before tab-before--active">
      <div class="avatar avatar--active"></div>
      <div class="label-wrap">
        <span class="main">すべてのプラン</span>
        <span class="sub">4プラン一覧</span>
      </div>
    </button>
    <button class="tab-before">
      <div class="avatar"></div>
      <div class="label-wrap">
        <span class="main">筋肉量を増やしたい</span>
        <span class="sub">バルクアップ・増量</span>
      </div>
    </button>
    <button class="tab-before">
      <div class="avatar"></div>
      <div class="label-wrap">
        <span class="main">コンディションを維持したい</span>
        <span class="sub">体重管理・バランス維持</span>
      </div>
    </button>
    <button class="tab-before">
      <div class="avatar"></div>
      <div class="label-wrap">
        <span class="main">体脂肪を落としたい</span>
        <span class="sub">減量・シェイプアップ</span>
      </div>
    </button>
  </div>
</div>

<!-- AFTER: fam-voices参考の新デザイン -->
<div class="section">
  <p class="label">AFTER（fam-voices参考 — 色はそのまま）</p>
  <div class="tabs">
    <button class="tab-after tab-after--active">
      <div class="avatar avatar--active"></div>
      <div class="label-wrap">
        <span class="main">すべてのプラン</span>
        <span class="sub">4プラン一覧</span>
      </div>
    </button>
    <button class="tab-after">
      <div class="avatar"></div>
      <div class="label-wrap">
        <span class="main">筋肉量を増やしたい</span>
        <span class="sub">バルクアップ・増量</span>
      </div>
    </button>
    <button class="tab-after">
      <div class="avatar"></div>
      <div class="label-wrap">
        <span class="main">コンディションを維持したい</span>
        <span class="sub">体重管理・バランス維持</span>
      </div>
    </button>
    <button class="tab-after">
      <div class="avatar"></div>
      <div class="label-wrap">
        <span class="main">体脂肪を落としたい</span>
        <span class="sub">減量・シェイプアップ</span>
      </div>
    </button>
  </div>
</div>

<!-- 参考: fam-voicesカード -->
<div class="section">
  <p class="label">参考: fam-voices アスリートの声カード</p>
  <div class="tabs">
    <div class="voice-card">
      <div class="avatar"></div>
      <div>
        <div class="text">パフォーマンスのためにバランスよく栄養を摂りたい</div>
        <div class="attr">20代 プロ野球選手</div>
      </div>
    </div>
    <div class="voice-card">
      <div class="avatar"></div>
      <div>
        <div class="text">遠征先では食事の選択肢はほぼない</div>
        <div class="attr">20代 プロ野球選手</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
